---
# Ansible role: ciso_assistant
# Nasadí CISO Assistant (GRC platforma) jako split-stack:
#   - cisobackend: Django REST API na portu 8000
#   - cisofrontend: SvelteKit UI na portu 3000
#   - cisohuey: Huey task queue pro asynchronní operace
#   - db_ciso: PostgreSQL 15 databáze
# Po startu nakonfiguruje OIDC přihlašování přes Keycloak.

# Vytvoří pracovní adresáře pro konfiguraci a data CISO Assistant
- name: Create CISO Assistant directory
  file:
    path: "{{ project_root }}/ciso_assistant"
    state: directory
    mode: '0755'
  tags: [ciso_assistant]

- name: Create files directory
  file:
    path: "{{ project_root }}/ciso_assistant/files"
    state: directory
    mode: '0755'
  tags: [ciso_assistant]

# Vygeneruje Django settings.py z Jinja2 šablony;
# obsahuje konfiguraci DB, OIDC providera, auditního logu a dalších parametrů
- name: Deploy Custom Settings
  template:
    src: settings.py.j2
    dest: "{{ project_root }}/ciso_assistant/settings.py"
    mode: '0644'
  tags: [ciso_assistant]
  notify: restart ciso_assistant

# Vygeneruje docker-compose.yml pro všechny čtyři CISO Assistant kontejnery
- name: Deploy CISO Assistant Docker Compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ project_root }}/ciso_assistant/docker-compose.yml"
    mode: '0644'
  tags: [ciso_assistant]
  notify: restart ciso_assistant

# Extrahuje interní Root CA certifikát Caddy pro přidání do trust store backendu;
# Django backend potřebuje důvěřovat Caddy CA při zpětném volání na auth.oss.local
- name: Extract Caddy Root CA Certificate
  shell: docker exec caddy cat /data/caddy/pki/authorities/local/root.crt > {{ project_root }}/ciso_assistant/caddy_root_ca.crt
  tags: [ciso_assistant]
  notify: restart ciso_assistant

# Spustí všechny CISO Assistant kontejnery (backend, frontend, huey, db)
- name: Start CISO Assistant Service
  community.docker.docker_compose_v2:
    project_src: "{{ project_root }}/ciso_assistant"
    state: present
  tags: [ciso_assistant]

# Počká na dostupnost Django health check endpointu;
# první start trvá déle kvůli migraci databáze a inicializaci Huey
- name: Wait for CISO Assistant Backend to be ready
  command: docker exec cisobackend /code/.venv/bin/python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"
  register: result
  until: result.rc == 0
  retries: 60
  delay: 5
  tags: [ciso_assistant]

# Přihlásí Keycloak admin klienta pro následné operace přes kcadm.sh
- name: Authenticate Keycloak admin CLI
  command: >
    docker exec keycloak /opt/keycloak/bin/kcadm.sh config credentials
    --server http://localhost:8080
    --realm master
    --user {{ keycloak_admin_user }}
    --password {{ keycloak_admin_password }}
  tags: [ciso_assistant]

# Získá UUID klienta ciso-assistant-oidc z Keycloaku
- name: Get CISO OIDC client UUID
  command: >
    docker exec keycloak /opt/keycloak/bin/kcadm.sh get clients -r Lab
    --fields id,clientId --query clientId=ciso-assistant-oidc
  register: ciso_client_json
  tags: [ciso_assistant]

# Vygeneruje náhodný OIDC secret a nastaví ho v Keycloaku
- name: Generate and set OIDC client secret in Keycloak
  vars:
    client_uuid: "{{ (ciso_client_json.stdout | from_json)[0].id }}"
    generated_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  command: >
    docker exec keycloak /opt/keycloak/bin/kcadm.sh update
    clients/{{ client_uuid }} -r Lab -s secret={{ generated_secret }}
  register: secret_result
  tags: [ciso_assistant]

# Přečte aktuální secret z Keycloaku pro použití v CISO setup skriptu
- name: Read OIDC client secret from Keycloak
  vars:
    client_uuid: "{{ (ciso_client_json.stdout | from_json)[0].id }}"
  command: >
    docker exec keycloak /opt/keycloak/bin/kcadm.sh get
    clients/{{ client_uuid }} -r Lab --fields secret
  register: ciso_secret_json
  tags: [ciso_assistant]

- name: Set OIDC secret variable
  set_fact:
    ciso_oidc_secret: "{{ (ciso_secret_json.stdout | from_json).secret }}"
  tags: [ciso_assistant]

# Vygeneruje Python skript pro konfiguraci OIDC s aktuálním secretem z Keycloaku
- name: Copy Setup OIDC Script
  template:
    src: setup_oidc.py.j2
    dest: "{{ project_root }}/ciso_assistant/setup_oidc.py"
    mode: '0644'
  tags: [ciso_assistant]

# Zkopíruje skript do kontejneru
- name: Copy Script to Container
  command: docker cp {{ project_root }}/ciso_assistant/setup_oidc.py cisobackend:/opt/setup_oidc.py
  tags: [ciso_assistant]

# Spustí skript, který nakonfiguruje OIDC SocialApp a GlobalSettings v Django ORM;
# po tomto kroku se uživatelé mohou přihlásit přes Keycloak (SSO)
- name: Execute OIDC Setup
  command: docker exec cisobackend /code/.venv/bin/python /opt/setup_oidc.py
  register: setup_output
  changed_when: "'configured successfully' in setup_output.stdout"
  tags: [ciso_assistant]

# Nahraje demo data: Framework Vyhlášky 410/2025, organizační data Energo-Služby
# a compliance assessment s mapováním nástrojů OSS stacku na požadavky
- name: Copy CISO Seed Script to Container
  command: docker cp {{ role_path }}/files/ciso_upload.py cisobackend:/code/ciso_upload.py
  tags: [ciso_assistant]

- name: Run CISO Seed Script
  command: docker exec cisobackend /code/.venv/bin/python3 /code/ciso_upload.py
  register: seed_output
  changed_when: "'Framework vytvoren' in seed_output.stdout"
  failed_when: seed_output.rc != 0
  tags: [ciso_assistant]
